<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>
</head>
<body>
    <h1>Danh sách sản phẩm</h1>

    <a href="/create">Thêm sản phẩm</a>

    <table border="1" cellpadding="10" cellspacing="0">
        <tr>
            <th>ID</th>
            <th>Tên</th>
            <th>Giá</th>
            <th>Số lượng</th>
            <th>Hành động</th>
        </tr>

        {% for product in products %}
        <tr>
            <td>{{ product["id"] }}</td>
            <td>{{ product["name"] }}</td>
            <td>{{ product["price"] }}</td>
            <td>{{ product["quantity"] }}</td>
            <td>
                <a href="/edit/{{ product['id'] }}">Sửa</a>
                <a href="/delete/{{ product['id'] }}" onclick="return confirm('Bạn có chắc muốn xóa không?')">Xóa</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
